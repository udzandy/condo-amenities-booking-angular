<div class="booking-page">

  <!-- TITLE -->
  <h2 class="page-title">
    {{ currentAmenity.title }}
  </h2>

  <!-- TOP LAYOUT -->
  <div class="top-layout">

    <!-- CALENDAR -->
    <mat-card class="calendar-card">

      <mat-calendar
        [dateFilter]="dateFilter"
        [dateClass]="dateClass"
        [selected]="selectedDate"
        (selectedChange)="onDateSelected($event)">
      </mat-calendar>

    </mat-card>

    <!-- UNIT LIST -->
    <div class="units-container">

      <mat-card
        class="unit-card"
        *ngFor="let unit of currentAmenity.units">

        <!-- UNIT TITLE -->
        <div class="unit-header">
          {{ unit.name }}
        </div>

        <!-- SLOT BUTTONS -->
        <div class="slots">

          <button
            *ngFor="let slot of unit.slots"
            [disabled]="!slot.available"
            [class.selected-slot]="isSelectedSlot(unit.name, slot.time)"
            [class.unavailable]="!slot.available"
            (click)="selectSlot(unit, slot)">

            {{ slot.time }}

          </button>

        </div>

      </mat-card>

    </div>

  </div>

  <!-- BOOK BUTTON -->
  <div class="book-btn">

    <button
      mat-raised-button
      color="primary"
      [disabled]="!selectedDate || !selectedSlot"
      (click)="openConfirmDialog()">

      Book Now

    </button>

  </div>

</div>
