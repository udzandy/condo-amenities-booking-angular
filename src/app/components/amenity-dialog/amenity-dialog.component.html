<h2 mat-dialog-title>
  {{ data ? 'Edit Amenity' : 'Add Amenity' }}
</h2>

<mat-dialog-content>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Name</mat-label>

    <input
      matInput
      [(ngModel)]="model.name">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Description</mat-label>

    <!-- <textarea
      matInput
      rows="3"
      [(ngModel)]="model.description">
    </textarea> -->
    <input
      matInput
      [(ngModel)]="model.description">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Price</mat-label>

    <input matInput [(ngModel)]="model.price">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Image Path</mat-label>

    <input matInput [(ngModel)]="model.imagePath">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Route Path</mat-label>

    <input matInput [(ngModel)]="model.routePath">
  </mat-form-field>

  <mat-checkbox [(ngModel)]="model.isActive">
    Active
  </mat-checkbox>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button mat-dialog-close>
    Cancel
  </button>

  <button mat-raised-button color="primary" (click)="save()">
    Save
  </button>

</mat-dialog-actions>
